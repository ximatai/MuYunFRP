frp-agent:
  type: tcp
  agent-name: home-agent
  frp-tunnel:
    host: 127.0.0.1
    port: 8083
  auth:
    token: ${FRP_AGENT_TUNNEL_TOKEN}
  proxy:
    host: 192.168.6.203
    port: 22

quarkus:
  log:
    category:
      "net.ximatai":
        level: DEBUG

    level: INFO
    console:
      enable: true
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) Line:%L - %s%e%n"
