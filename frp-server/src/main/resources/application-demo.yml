frp-server:
  management:
    port: 8089
    username: ${FRP_SERVER_MANAGEMENT_USERNAME}
    password: ${FRP_SERVER_MANAGEMENT_PASSWORD}
  tunnel-store:
    path: ./config/tunnels.json

quarkus:
  http:
    port: ${frp-server.management.port}
  log:
    category:
      "net.ximatai":
        level: DEBUG

    level: INFO
    console:
      enabled: true
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) Line:%L - %s%e%n"
    file:
      enabled: true
      path: logs/frp-server.log
      level: DEBUG
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] (%t) Line:%L - %s%e%n"
      rotation:
        file-suffix: .yyyy-MM-dd
        rotate-on-boot: true
        max-backup-index: 7
